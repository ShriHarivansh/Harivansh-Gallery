<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="H – your personal offline space">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="H">

  <title>H</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- ─── ONBOARDING ─────────────────────────────────────────────────────── -->
<div id="onboarding">
  <div class="onboarding-card">
    <div class="onboarding-logo">H</div>
    <div>
      <div class="onboarding-title">Set up your space</div>
      <div class="onboarding-subtitle" style="margin-top:6px">This is private — only you will see it</div>
    </div>

    <!-- Avatar -->
    <div class="field-group">
      <div class="field-label">Profile photo</div>
      <div class="avatar-upload-area">
        <div class="avatar-preview" id="ob-avatar-area">
          <div id="ob-avatar-preview">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>
        <button class="avatar-upload-btn" type="button">Upload photo</button>
        <input type="file" id="ob-avatar-input" accept="image/*" style="display:none">
      </div>
    </div>

    <!-- Name -->
    <div class="field-group">
      <label class="field-label" for="ob-name">Display name</label>
      <input class="field-input" id="ob-name" type="text"
             placeholder="Your name" maxlength="50" autocomplete="off">
    </div>

    <!-- Handle -->
    <div class="field-group">
      <label class="field-label" for="ob-handle">Username</label>
      <input class="field-input" id="ob-handle" type="text"
             placeholder="@username" maxlength="30" autocomplete="off">
    </div>

    <button class="btn-primary" id="btn-start">Get started →</button>
  </div>
</div>

<!-- ─── APP SHELL ──────────────────────────────────────────────────────── -->
<div id="app">
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <span class="sidebar-logo">H</span>

      <!-- Nav items -->
      <a class="nav-item active" href="#" aria-label="Home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="nav-label">Home</span>
      </a>

      <a class="nav-item" href="#" aria-label="Profile" id="nav-profile-link">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="nav-label">Profile</span>
      </a>

      <!-- Install button (hidden until PWA prompt available) -->
      <button class="nav-item" id="install-btn" style="display:none; border:none; cursor:pointer; background:none; color:var(--text);" aria-label="Install app">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="nav-label">Install H</span>
      </button>

      <!-- Post button (large screens) -->
      <button class="nav-item post-btn" id="nav-post-btn" aria-label="Post">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        </svg>
        <span class="nav-label">Post</span>
      </button>

      <!-- Profile chip -->
      <div class="sidebar-profile">
        <div id="sidebar-avatar"></div>
        <div class="sidebar-profile-info">
          <span class="sidebar-profile-name" id="sidebar-name"></span>
          <span class="sidebar-profile-handle" id="sidebar-handle"></span>
        </div>
      </div>
    </aside>

    <!-- MAIN COLUMN -->
    <main class="main-col">
      <!-- Top bar -->
      <header class="top-bar">
        <span class="top-bar-title">Home</span>
      </header>

      <!-- Composer -->
      <section class="composer">
        <div id="composer-avatar"></div>
        <div class="composer-right">
          <textarea
            id="post-text"
            class="composer-textarea"
            placeholder="What's happening?"
            maxlength="520"
            rows="3"
            aria-label="Post composer"></textarea>

          <!-- Image preview -->
          <div id="img-preview-wrap" class="composer-image-preview">
            <img id="img-preview" alt="Image preview">
            <button class="remove-image-btn" id="remove-img" aria-label="Remove image">×</button>
          </div>

          <div class="composer-divider"></div>

          <div class="composer-actions">
            <div class="composer-tools">
              <!-- Image upload -->
              <button class="icon-btn" id="btn-img" title="Add image" aria-label="Upload image">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
              </button>
              <input type="file" id="img-input" accept="image/*" style="display:none">
            </div>

            <div style="display:flex;align-items:center;gap:12px">
              <span class="char-counter"><span id="char-count">500</span></span>
              <button class="btn-post" id="btn-post" disabled>Post</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Feed -->
      <section class="feed" id="feed" role="feed" aria-label="Posts"></section>
    </main>

    <!-- RIGHT PANEL -->
    <aside class="right-panel">
      <div class="widget-card">
        <div class="widget-title">Your space</div>
        <div class="stat-row">
          <span class="stat-label">Name</span>
          <span class="stat-value" id="stat-name">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Handle</span>
          <span class="stat-value" id="stat-handle">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Posts</span>
          <span class="stat-value" id="stat-posts">0</span>
        </div>
        <div class="widget-footer">All data is stored locally on your device. Nothing is sent anywhere.</div>
      </div>

      <div class="widget-card" style="background:transparent;border-color:var(--border)">
        <div style="font-size:12px;color:var(--text-dim);line-height:1.7">
          <strong style="color:var(--text-muted);font-size:13px">H</strong><br>
          A personal offline micro-journal.<br>
          Your posts live only on this device.<br><br>
          <span style="color:var(--text-dim)">Ctrl+Enter to post</span>
        </div>
      </div>
    </aside>

  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<script src="./app.js"></script>
</body>
</html>
